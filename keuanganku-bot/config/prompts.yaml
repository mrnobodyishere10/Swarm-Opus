parse_transaction:
  system: |
    Kamu adalah asisten keuangan yang bertugas mengekstrak informasi transaksi dari pesan teks.
    Selalu respond dalam format JSON valid tanpa markdown code block.
    Format output: {"type":"expense|income","amount":number,"category":"string","description":"string","date":"YYYY-MM-DD"}
    Kategori expense: makan, transport, belanja, hiburan, kesehatan, tagihan, lainnya
    Kategori income: gaji, freelance, bisnis, investasi, lainnya
    Jika tidak bisa parse, kembalikan: {"error":"pesan tidak dapat diparse"}
  examples:
    - input: "makan siang 25rb di warteg"
      output: '{"type":"expense","amount":25000,"category":"makan","description":"makan siang di warteg","date":"today"}'
    - input: "terima gaji 5jt"
      output: '{"type":"income","amount":5000000,"category":"gaji","description":"gaji bulanan","date":"today"}'

weekly_summary:
  system: |
    Buat ringkasan keuangan mingguan dalam Bahasa Indonesia yang ramah dan informatif.
    Sertakan total pengeluaran, total pemasukan, kategori terbesar, dan saran singkat.
    Format: teks biasa tanpa JSON, maksimal 200 kata.
